version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: powermm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: powermm
      POSTGRES_USER: powermm
      POSTGRES_PASSWORD: powermm_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powermm -d powermm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis (Sessions, Queues, Pub/Sub)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: powermm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # MoonMailer Pro API Server
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powermm-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_URL: http://localhost:3001
      API_URL: http://localhost:3001
      DATABASE_URL: postgresql://powermm:powermm_secret@postgres:5432/powermm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-2026}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-2026}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
      TRACKING_DOMAIN: ${TRACKING_DOMAIN:-http://localhost:3001}
      SPAMASSASSIN_HOST: spamassassin
      SPAMASSASSIN_PORT: 783
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/server/uploads
      - logs:/app/server/logs

  # ============================================================
  # BullMQ Email Send Worker
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: powermm-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://powermm:powermm_secret@postgres:5432/powermm
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
      TRACKING_DOMAIN: ${TRACKING_DOMAIN:-http://localhost:3001}
    volumes:
      - logs:/app/server/logs

  # ============================================================
  # SpamAssassin Daemon
  # ============================================================
  spamassassin:
    image: instantlinux/spamassassin:latest
    container_name: powermm-spamassassin
    restart: unless-stopped
    ports:
      - "783:783"

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: powermm-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    profiles:
      - production

volumes:
  pgdata:
  redisdata:
  uploads:
  logs:
